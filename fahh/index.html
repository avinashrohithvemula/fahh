<!DOCTYPE html>
<html>
<head>
    <title>Sound Button</title>

    <style>
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        button {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #00ffcc;
            color: black;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #00cc99;
            transform: scale(1.1);
        }
    </style>

</head>
<body>

<button onclick="playSound()">click here🔊</button>

<audio id="mySound" src="fahhh_audio.mpeg"></audio>

<script>
function playSound() {
    document.getElementById("mySound").play();
}
</script>

</body>
</html>
