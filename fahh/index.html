        html, body {

<div class="container">

<h1>Sound Button App</h1>

<p>
Click the button below to play a fun sound instantly.
This tool is simple, fast, and works on all devices.
</p>

<button id="btn">Click here 🔊</button>

</div>

<audio id="mySound" src="fahhh_audio.mpeg"></audio>

<script>
const btn = document.getElementById("btn");
const sound = document.getElementById("mySound");

btn.addEventListener("click", () => {
    sound.currentTime = 0;
    sound.play();
});
</script>
